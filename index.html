<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatineQA Solutions</title>
    <style>
        :root { --primary: #38bdf8; --dark: #0f172a; --card: #1e293b; }
        body { margin: 0; padding: 0; min-height: 100vh; background: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow-x: hidden; transition: all 0.3s ease; }
        
        /* زر تبديل اللغة */
        .lang-switch { position: absolute; top: 20px; left: 20px; z-index: 2000; }
        #lang-btn { background: var(--primary); color: var(--dark); border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        #lang-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; text-align: center; }
        h1 { color: var(--primary); font-size: 2.8rem; margin: 10px 0; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); font-weight: 800; }
        .badge { background: var(--primary); color: var(--dark); padding: 5px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 25px; display: inline-block; }

        /* معرض الصور */
        .slider-container { width: 100%; max-width: 850px; position: relative; border-radius: 20px; border: 3px solid var(--primary); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 30px; background: #000; }
        .slides { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; display: flex; align-items: center; justify-content: center; }
        .slide img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* مريم AI */
        #chat-widget { position: fixed; bottom: 25px; z-index: 1000; }
        .rtl-chat { right: 25px; } .ltr-chat { left: 25px; } /* تغيير مكان الشات حسب اللغة */
        
        #chat-button { width: 65px; height: 65px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.4s; }
        #chat-window { position: fixed; bottom: 100px; width: 360px; height: 480px; background: var(--card); border-radius: 25px; border: 1px solid var(--primary); display: none; flex-direction: column; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        
        #chat-header { background: var(--primary); color: var(--dark); padding: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; }
        .bot { background: #334155; align-self: flex-start; }
        .user { background: var(--primary); color: var(--dark); align-self: flex-end; }
        
        #chat-input-area { padding: 15px; background: #0b1121; display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        #send-btn { background: var(--primary); border: none; padding: 8px 18px; border-radius: 12px; cursor: pointer; color: var(--dark); font-weight: bold; }
    </style>
</head>
<body class="rtl-mode">

    <div class="lang-switch">
        <button id="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <div class="main-container">
        <span class="badge" id="txt-badge">نظام MatineQA المتكامل</span>
        <h1 id="txt-title">MATINEQA SOLUTIONS</h1>
        
        <div class="slider-container">
            <div class="slides" id="slider">
                <div class="slide"><img src="matine-2banner.jpg.png" alt="1"></div>
                <div class="slide"><img src="matine-banner.jpg.png" alt="2"></div>
                <div class="slide"><img src="matine-boss.png.png" alt="3"></div>
            </div>
        </div>

        <p id="txt-desc" style="max-width: 600px; color: #94a3b8; font-size: 1.1rem;">
            أهلاً بك مهندس صديقي. استعرض بيئة الجودة الرقمية وتفاعل مع مريم AI.
        </p>
    </div>

    <div id="chat-widget" class="rtl-chat">
        <div id="chat-window" id="chat-win">
            <div id="chat-header">
                <span id="txt-chat-header">👧 مريم AI - دعم الجودة</span>
                <button onclick="toggleChat()" style="background:none; border:none; font-weight:bold; cursor:pointer;">×</button>
            </div>
            <div id="chat-messages" id="msg-container">
                <div class="message bot" id="txt-welcome">مرحباً مهندس! أنا مريم، كيف يمكنني مساعدتك في بيانات الجودة اليوم؟</div>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="اكتب هنا...">
                <button id="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
        <div id="chat-button" onclick="toggleChat()">
            <span style="font-size: 32px;">👧</span>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const translations = {
            ar: {
                btn: 'English',
                badge: 'نظام MatineQA المتكامل',
                title: 'MATINEQA SOLUTIONS',
                desc: 'أهلاً بك مهندس صديقي. استعرض بيئة الجودة الرقمية وتفاعل مع مريم AI.',
                chatHeader: '👧 مريم AI - دعم الجودة',
                welcome: 'مرحباً مهندس! أنا مريم، كيف يمكنني مساعدتك في بيانات الجودة اليوم؟',
                placeholder: 'اكتب هنا...',
                send: 'إرسال',
                botResponse: 'جاري معالجة طلبك بخصوص: '
            },
            en: {
                btn: 'العربية',
                badge: 'MatineQA Integrated System',
                title: 'MATINEQA SOLUTIONS',
                desc: 'Welcome Eng. Sediki. Explore your digital QA environment and interact with Meriem AI.',
                chatHeader: '👧 Meriem AI - Quality Support',
                welcome: 'Hello Engineer! I am Meriem. How can I assist with your QC data today?',
                placeholder: 'Type here...',
                send: 'Send',
                botResponse: 'Processing your request for: '
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const html = document.getElementById('html-tag');
            const widget = document.getElementById('chat-widget');
            
            // تحديث الاتجاه والنصوص
            if(currentLang === 'en') {
                html.dir = 'ltr'; html.lang = 'en';
                widget.className = 'ltr-chat';
            } else {
                html.dir = 'rtl'; html.lang = 'ar';
                widget.className = 'rtl-chat';
            }

            document.getElementById('lang-btn').innerText = translations[currentLang].btn;
            document.getElementById('txt-badge').innerText = translations[currentLang].badge;
            document.getElementById('txt-desc').innerText = translations[currentLang].desc;
            document.getElementById('txt-chat-header').innerText = translations[currentLang].chatHeader;
            document.getElementById('txt-welcome').innerText = translations[currentLang].welcome;
            document.getElementById('chat-input').placeholder = translations[currentLang].placeholder;
            document.getElementById('send-btn').innerText = translations[currentLang].send;
        }

        // Slider Logic
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % 3;
            const move = document.getElementById('html-tag').dir === 'rtl' ? (idx * 100) : -(idx * 100);
            document.getElementById('slider').style.transform = `translateX(${move}%)`;
        }, 4000);

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const container = document.getElementById('chat-messages');
            if (input.value.trim() !== "") {
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.textContent = input.value;
                container.appendChild(userMsg);
                
                setTimeout(() => {
                    const botMsg = document.createElement('div');
                    botMsg.className = 'message bot';
                    botMsg.textContent = translations[currentLang].botResponse + "(" + input.value + ")";
                    container.appendChild(botMsg);
                    container.scrollTop = container.scrollHeight;
                }, 800);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
