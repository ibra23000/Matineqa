<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatineQA Solutions | Professional Inspection Suite</title>
    <style>
        :root { --primary: #38bdf8; --dark: #0f172a; --card: #1e293b; --success: #4ade80; }
        body { margin: 0; padding: 0; min-height: 100vh; background: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; color: white; transition: all 0.3s ease; }
        
        .lang-switch { position: absolute; top: 20px; left: 20px; z-index: 2000; }
        #lang-btn { background: var(--primary); color: var(--dark); border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; text-align: center; }
        h1 { color: var(--primary); font-size: 2.8rem; margin: 10px 0; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        /* Slider Section */
        .slider-container { width: 100%; max-width: 800px; position: relative; border-radius: 20px; border: 3px solid var(--primary); overflow: hidden; margin-bottom: 30px; background: #000; }
        .slides { display: flex; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; }
        .slide img { width: 100%; height: auto; display: block; }

        /* Chat & Form Interface */
        #chat-widget { position: fixed; bottom: 25px; z-index: 1000; }
        .rtl-chat { right: 25px; } .ltr-chat { left: 25px; }
        
        #chat-button { width: 65px; height: 65px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        #chat-window { position: fixed; bottom: 100px; width: 380px; height: 550px; background: var(--card); border-radius: 25px; border: 1px solid var(--primary); display: none; flex-direction: column; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        
        #chat-header { background: var(--primary); color: var(--dark); padding: 18px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Inspection Form Style */
        .inspection-form { background: #0f172a; padding: 15px; border-radius: 15px; border: 1px solid var(--primary); margin-top: 10px; font-size: 0.85rem; }
        .inspection-form input, .inspection-form select { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: none; background: #1e293b; color: white; }
        .btn-generate { background: var(--success); color: var(--dark); border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .message { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; }
        .bot { background: #334155; align-self: flex-start; }
        .user { background: var(--primary); color: var(--dark); align-self: flex-end; }
        
        #chat-input-area { padding: 15px; background: #0b1121; display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        #send-btn { background: var(--primary); border: none; padding: 8px 18px; border-radius: 12px; cursor: pointer; color: var(--dark); font-weight: bold; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button id="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <div class="main-container">
        <span id="txt-badge" style="background:var(--primary); color:var(--dark); padding:5px 20px; border-radius:50px; font-weight:bold; margin-bottom:20px;">المنصة الهندسية الذكية</span>
        <h1 id="txt-title">MATINEQA SOLUTIONS</h1>
        
        <div class="slider-container">
            <div class="slides" id="slider">
                <div class="slide"><img src="matine-2banner.jpg.png"></div>
                <div class="slide"><img src="matine-banner.jpg.png"></div>
                <div class="slide"><img src="matine-boss.png.png"></div>
            </div>
        </div>
        <p id="txt-desc">نظام إدارة الجودة الرقمي - معالجة تقارير PV VT/PT/RT وفق المعايير الدولية.</p>
    </div>

    <div id="chat-widget" class="rtl-chat">
        <div id="chat-window">
            <div id="chat-header">
                <span id="txt-chat-header">👧 مريم AI - مهندس الجودة الرقمي</span>
                <button onclick="toggleChat()" style="background:none; border:none; cursor:pointer; font-weight:bold;">×</button>
            </div>
            <div id="chat-messages" id="msg-container">
                <div class="message bot" id="txt-welcome">مرحباً مهندس صديقي. هل تود تجهيز تقرير PV جديد اليوم؟ اطلب مني "تقرير جديد" للبدء.</div>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="اطلب تجهيز PV...">
                <button id="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
        <div id="chat-button" onclick="toggleChat()">
            <span style="font-size: 32px;">👧</span>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const translations = {
            ar: { btn: 'English', welcome: 'مرحباً مهندس! اطلب "تقرير جديد" لتجهيز PV.', promptPV: 'اختر نوع التقرير المطلوب:', generate: 'توليد مسودة التقرير' },
            en: { btn: 'العربية', welcome: 'Hello Eng! Type "New Report" to generate a PV.', promptPV: 'Select Inspection Method:', generate: 'Generate Report Draft' }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = translations[currentLang].btn;
            // (يمكن إضافة باقي الترجمات هنا كما في الكود السابق)
        }

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const container = document.getElementById('chat-messages');
            const val = input.value.trim().toLowerCase();
            
            if (val !== "") {
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.textContent = input.value;
                container.appendChild(userMsg);

                // الاستجابة الذكية للأوامر الهندسية
                setTimeout(() => {
                    const botMsg = document.createElement('div');
                    botMsg.className = 'message bot';
                    
                    if (val.includes("pv") || val.includes("تقرير") || val.includes("report")) {
                        botMsg.innerHTML = `
                            ${translations[currentLang].promptPV}
                            <div class="inspection-form">
                                <select id="inspect-type">
                                    <option>Visual Testing (VT)</option>
                                    <option>Penetrant Testing (PT)</option>
                                    <option>Magnetic Testing (MT)</option>
                                </select>
                                <input type="text" id="proj-name" placeholder="Project Name">
                                <input type="text" id="line-no" placeholder="Line / ISO Number">
                                <select id="standard">
                                    <option>ASME B31.3</option>
                                    <option>DNV-ST-F101</option>
                                    <option>API 1104</option>
                                </select>
                                <button class="btn-generate" onclick="generatePV()">${translations[currentLang].generate}</button>
                            </div>
                        `;
                    } else {
                        botMsg.textContent = "أنا جاهزة لتحليل المعايير الهندسية. زودني برقم الخط أو نوع الاختبار.";
                    }
                    container.appendChild(botMsg);
                    container.scrollTop = container.scrollHeight;
                }, 800);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }

        function generatePV() {
            const type = document.getElementById('inspect-type').value;
            const proj = document.getElementById('proj-name').value;
            const std = document.getElementById('standard').value;
            alert(`جاري معالجة تقرير ${type} لمشروع ${proj} بناءً على كود ${std}. سيتم استخراج البيانات وتجهيز الـ PV فوراً.`);
        }

        // Slider Auto
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % 3;
            document.getElementById('slider').style.transform = `translateX(${document.getElementById('html-tag').dir === 'rtl' ? (idx * 100) : -(idx * 100)}%)`;
        }, 5000);
    </script>
</body>
</html>
