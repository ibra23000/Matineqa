<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatineQA - منصة مريم الهندسية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.5; }
        .user-message { align-self: flex-end; background-color: #007bff; color: white; }
        .bot-message { align-self: flex-start; background-color: #e9e9eb; color: #333; }
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message bot-message">أهلاً بك مهندس صديقي في منصة MatineQA. أنا مريم، كيف يمكنني مساعدتك في فحص الجودة اليوم؟</div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="اكتب سؤالك الهندسي هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()">إرسال</button>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat-container');
        const text = inputField.value.trim();

        if (!text) return;

        // إضافة رسالة المستخدم للواجهة
        appendMessage(text, 'user-message');
        inputField.value = '';
        sendBtn.disabled = true;

        try {
            // ملاحظة: استخدمنا /api/chat وهو المسار الذي يتعرف عليه Vercel تلقائياً
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });

            const data = await response.json();

            if (response.ok) {
                appendMessage(data.reply, 'bot-message');
            } else {
                // عرض الخطأ القادم من السيرفر مباشرة للمساعدة في التشخيص
                appendMessage("خطأ تقني: " + (data.reply || "فشل الاتصال بالخادم"), 'bot-message');
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            appendMessage("عذراً، تعذر الوصول إلى ملف الخادم. تأكد من رفع مجلد api بشكل صحيح على Vercel.", 'bot-message');
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(text, className) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
